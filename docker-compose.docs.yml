services:
  docs:
    image: beyond_trend_local_docs
    container_name: beyond_trend_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./beyond_trend:/app/beyond_trend:z
    ports:
      - '9000:9000'
    command: /start-docs
